server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4200
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - Accept
              - Origin
            exposedHeaders:
              - Authorization
            allowCredentials: true
            maxAge: 3600
      routes:
        # Auth endpoints should NOT go through JwtAuthenticationFilter
        - id: auth
          uri: lb://SIGNUPLOGIN-SERVICE
          predicates:
            - Path=/api/auth/**

        # User profile endpoint should be authenticated
        - id: User-profile
          uri: lb://SIGNUPLOGIN-SERVICE
          predicates:
            - Path=/api/logged/**
          filters:
            - JwtAuthenticationFilter

        - id: department
          uri: lb://DOCTOR-DEPARTMENT-SERVICE
          predicates:
            - Path=/api/departments/**
          filters:
            - JwtAuthenticationFilter

        - id: doctor
          uri: lb://DOCTOR-DEPARTMENT-SERVICE
          predicates:
            - Path=/api/doctors/**
          filters:
            - JwtAuthenticationFilter

        - id: appointment
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/api/appointment/**
          filters:
            - JwtAuthenticationFilter

        - id: emr
          uri: lb://EMR-SERVICE
          predicates:
            - Path=/api/medical-records/**
          filters:
            - JwtAuthenticationFilter

        - id: billing
          uri: lb://BILLING-SERVICE
          predicates:
            - Path=/api/billing/**
          filters:
            - JwtAuthenticationFilter

        - id: inventory
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/medicines/**
          filters:
            - JwtAuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
# CORS for Angular dev
management: { endpoints: { web: { exposure: { include: "*" } } } }